basePath: /
definitions:
  handlers.createCloudEnvRequest:
    properties:
      auth_type:
        allOf:
        - $ref: '#/definitions/models.AuthType'
        enum:
        - oidc
        - iam_cross_account_role
        - service_account_key
      name:
        type: string
      provider:
        allOf:
        - $ref: '#/definitions/models.CloudProvider'
        enum:
        - aws
        - gcp
        - azure
        - other
      role_arn:
        type: string
    required:
    - auth_type
    - name
    - provider
    type: object
  handlers.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handlers.loginResponse:
    properties:
      token:
        type: string
    type: object
  handlers.registerRequest:
    properties:
      email:
        type: string
      organization_name:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - organization_name
    - password
    type: object
  handlers.registerResponse:
    properties:
      organization:
        properties:
          id:
            type: string
          name:
            type: string
          tier:
            type: string
        type: object
      user:
        properties:
          email:
            type: string
          id:
            type: string
          role:
            type: string
        type: object
    type: object
  handlers.triggerRequest:
    properties:
      environment_id:
        type: string
      module_name:
        type: string
    required:
    - environment_id
    - module_name
    type: object
  handlers.webhookRequest:
    properties:
      job_id:
        type: string
      logs:
        type: string
      status:
        enum:
        - success
        - failed
        type: string
    required:
    - job_id
    - status
    type: object
  models.AuthType:
    enum:
    - oidc
    - iam_cross_account_role
    - service_account_key
    type: string
    x-enum-varnames:
    - AuthTypeOIDC
    - AuthTypeIAMCrossAccountRole
    - AuthTypeServiceAccountKey
  models.CloudEnvironment:
    properties:
      auth_type:
        $ref: '#/definitions/models.AuthType'
      connection_status:
        $ref: '#/definitions/models.ConnStatus'
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      organization_id:
        type: string
      provider:
        $ref: '#/definitions/models.CloudProvider'
      role_arn:
        description: RoleARN is nullable — not all auth types require it.
        type: string
      updated_at:
        type: string
    type: object
  models.CloudProvider:
    enum:
    - aws
    - gcp
    - azure
    - other
    type: string
    x-enum-varnames:
    - CloudProviderAWS
    - CloudProviderGCP
    - CloudProviderAzure
    - CloudProviderOther
  models.ConnStatus:
    enum:
    - active
    - inactive
    - error
    - pending
    type: string
    x-enum-varnames:
    - ConnStatusActive
    - ConnStatusInactive
    - ConnStatusError
    - ConnStatusPending
  models.Deployment:
    properties:
      created_at:
        type: string
      environment_id:
        type: string
      id:
        type: string
      job_id:
        description: JobID is the opaque tracking ID returned by the CI/CD provider
          after trigger.
        type: string
      logs:
        description: Logs holds captured terminal output; null until the pipeline
          completes.
        type: string
      module_name:
        type: string
      organization_id:
        type: string
      status:
        $ref: '#/definitions/models.DeploymentStatus'
      updated_at:
        type: string
    type: object
  models.DeploymentStatus:
    enum:
    - queued
    - running
    - success
    - failed
    type: string
    x-enum-varnames:
    - DeploymentStatusQueued
    - DeploymentStatusRunning
    - DeploymentStatusSuccess
    - DeploymentStatusFailed
  models.InfrastructureResource:
    properties:
      attributes:
        description: Attributes holds arbitrary cloud-provider metadata (region, tags,
          sizing…).
        type: object
      created_at:
        type: string
      environment_id:
        type: string
      id:
        type: string
      last_audited_at:
        description: LastAuditedAt is nullable — newly discovered resources have not
          been audited.
        type: string
      organization_id:
        type: string
      provider_resource_id:
        type: string
      resource_type:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  repository.CostSummaryRow:
    properties:
      currency:
        type: string
      service_category:
        type: string
      total_amount:
        description: TotalAmount is a string-encoded NUMERIC to avoid float64 rounding
          loss.
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Cloud Management Platform — multi-tenant API Gateway.
  title: CMP-Core API
  version: "1.0"
paths:
  /api/v1/costs/summary:
    get:
      description: Aggregates daily_costs for the current calendar month, grouped
        by service category.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/repository.CostSummaryRow'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Current-month cost summary by service category
      tags:
      - finops
  /api/v1/deployments:
    post:
      consumes:
      - application/json
      description: 'Creates a deployment record (status: queued), calls the CI/CD
        provider to start the pipeline, then updates the record with the returned
        job_id (status: running). Returns 202 Accepted.'
      parameters:
      - description: Deployment details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.triggerRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/models.Deployment'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Trigger an IaC pipeline deployment
      tags:
      - deployments
  /api/v1/environments:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.CloudEnvironment'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all cloud environments for the tenant
      tags:
      - environments
    post:
      consumes:
      - application/json
      parameters:
      - description: Environment details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.createCloudEnvRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.CloudEnvironment'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Register a new cloud environment (spoke)
      tags:
      - environments
  /api/v1/infrastructure:
    get:
      description: Returns all discovered cloud resources. Filter by env_id to scope
        to one environment.
      parameters:
      - description: Filter by cloud environment UUID
        in: query
        name: env_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.InfrastructureResource'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List infrastructure resources for the tenant
      tags:
      - infrastructure
  /api/v1/webhooks/cicd:
    post:
      consumes:
      - application/json
      description: Called by the CI/CD system when a pipeline finishes. Authenticated
        by X-Webhook-Secret header (not a user JWT). Updates the deployment record
        status and logs.
      parameters:
      - description: Pre-shared webhook secret
        in: header
        name: X-Webhook-Secret
        required: true
        type: string
      - description: Pipeline result
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.webhookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Receive CI/CD pipeline completion callbacks
      tags:
      - webhooks
  /login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.loginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Authenticate and receive a JWT
      tags:
      - identity
  /register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.registerResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new organization and owner account
      tags:
      - identity
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: 'Enter your JWT as: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
