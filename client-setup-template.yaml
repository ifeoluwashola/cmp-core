AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cloud Management Platform (CMP) Cross-Account IAM Roles. This template creates a read-only Auditor role for infrastructure visibility and a dedicated Provisioning role for CI/CD deployments.'

Parameters:
  CmpAccountId:
    Type: String
    Description: 'The AWS Account ID of the CMP control plane. (Do not change)'
    Default: '251478238597' # Your master AWS Account ID
    
  ExternalId:
    Type: String
    Description: 'The unique External ID generated by the CMP dashboard for secure role assumption.'
    MinLength: '10'

Resources:
  # --------------------------------------------------------------------------
  # 1. THE AUDITOR ROLE (Phase 1: Read-Only & FinOps)
  # --------------------------------------------------------------------------
  CMPAuditorRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub 'CMP-AuditorRole-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${CmpAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Ref ExternalId
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'
      Policies:
        - PolicyName: AllowCostExplorerAPI
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'ce:GetCostAndUsage'
                Resource: '*'

  # --------------------------------------------------------------------------
  # 2. THE PROVISIONING ROLE (Phase 2: CI/CD Builder)
  # --------------------------------------------------------------------------
  CMPProvisioningRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub 'CMP-ProvisioningRole-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              # Specifically trusts the GitHub Actions worker in the CMP account
              AWS: !Sub 'arn:aws:iam::${CmpAccountId}:user/cli-user'
            Action:
              - 'sts:AssumeRole'
              - 'sts:TagSession'
      ManagedPolicyArns:
        # Grants full access to build infrastructure. Can be scoped down later.
        - 'arn:aws:iam::aws:policy/AdministratorAccess'

Outputs:
  AuditorRoleArn:
    Description: 'Copy this ARN and paste it into the "Audit Role ARN" field in the CMP Dashboard.'
    Value: !GetAtt CMPAuditorRole.Arn
    
  ProvisioningRoleArn:
    Description: 'Copy this ARN and paste it into the "Provisioning Role ARN" field in the CMP Dashboard.'
    Value: !GetAtt CMPProvisioningRole.Arn